<app-section-layout sectionId="hero" title="">
    <div class="hero">
        <div class="division profile">
            <picture>
                <img src="assets/profile.jpg" alt="Lucas Justi Scariot" />
            </picture>
        </div>

        <div class="division infos">
            <h1>{{ name }}</h1>

            <p>{{ role }}</p>

            <div class="buttons">
                <button class="contactButton">
                    Entre em Contato
                </button>

                <button class="projectButton">
                    Ver Projetos
                </button>
            </div>

            <div class="links">
                <a [href]="github">
                    <i class="fa-brands fa-github"></i>
                </a>

                <a [href]="linkedin">
                    <i class="fa-brands fa-square-linkedin"></i>
                </a>
            </div>
        </div>
    </div>
    <svg class="ink" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none">
        <path d="M0,40 C250,120 450,100 600,90 C750,80 950,100 1200,80 L1200,120 L0,120 Z"></path>
    </svg>
</app-section-layout>
