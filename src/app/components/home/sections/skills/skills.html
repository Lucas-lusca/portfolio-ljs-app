<app-section-layout sectionId="skills" title="Habilidades" sectionClass="orangeSection" contentClass="orangeContent">
    <div class="skillsGrid" role="list" aria-label="Lista de habilidades técnicas">
        @for (skill of skills; track skill.name) {
        <app-skill-layout role="listitem" [name]="skill.name" [description]="skill.description">
        </app-skill-layout>
        }
    </div>
</app-section-layout>
